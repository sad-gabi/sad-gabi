<html>

<head>
  <title>Loading...</title>

  <script>
    let loadText = 'Loading.';
    const interval = setInterval(() => {
      document.title = loadText;
      loadText += '.';
      if (loadText === 'Loading....') {
        loadText = 'Loading.';
      }
    }, 500);
  </script>
</head>

<style>
  @font-face {
    font-family: Cormorant;
    src: url(fonts/CormorantUnicase-Regular.ttf);
  }

  html,
  body {
    height: 100svh;
    width: 100vw;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background-color: #000;
  }

  #loading-splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: #fff;
    font-family: Cormorant;
    font-size: 24px;
    gap: 40px;
  }

  #loading-logo {
    height: 30svh;
    width: fit-content;
    animation: logo-anim infinite forwards 1s;
  }

  @keyframes logo-anim {
    0% {
      opacity: 1;
    }

    50% {
      opacity: 0.5;
    }

    100% {
      opacity: 1;
    }
  }

  @media (max-width: 600px) {
    #loading-splash {
     font-size: 32px; 
    }

    #loading-logo {
      height: 40svh;
    }
  }
</style>

<body>
  <div id="loading-splash">
    <img id="loading-logo" src="images/logo.png" alt="Sad Gabi logo">
    This page is under construction...
  </div>
</body>

</html>
